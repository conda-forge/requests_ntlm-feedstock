schema_version: 1

context:
  name: requests_ntlm
  version: 1.3.0
  sha256: b29cc2462623dffdf9b88c43e180ccb735b4007228a542220e882c58ae56c668

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - pyspnego >=0.4.0
    - requests >=2.0.0
    - cryptography >=1.3

tests:
  - python:
      imports:
        - requests_ntlm
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: ISC
  license_file: LICENSE
  summary: NTLM authentication support for Requests.
  description: |
    This package allows for HTTP NTLM authentication using the requests library.
  homepage: https://github.com/requests/requests-ntlm
  repository: https://github.com/requests/requests-ntlm

extra:
  recipe-maintainers:
    - synapticarbors
